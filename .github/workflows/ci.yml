name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python:
    name: Python — ruff + pytest + pip-audit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio pytest-mock httpx pip-audit

      - name: ruff (F-rules + E9 + B)
        run: ruff check --select F,E9,B --exclude alembic --exclude tests .

      - name: pip-audit (CVE deps — blocks on any advisory)
        run: pip-audit -r requirements.txt --strict

      - name: Alembic migrations (forward + reverse + forward roundtrip)
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: pytest
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          POSTGRES_HOST: localhost
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
          POSTGRES_PORT: '5432'
          REDIS_URL: redis://localhost:6379/0
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          TEMPORAL_HOST: stub
          TEMPORAL_PORT: '7233'
          TEMPORAL_NAMESPACE: ci
          SECRET_KEY: ci-test-secret-not-real-but-not-placeholder
        # The pre-existing test/source drift catalogued in the wiring audit
        # (NotNullViolation in test_graph_builder, AssertionError in
        # test_template_helpers, ConnectionError in tests that expect a live
        # backend, etc.) currently produces 27 failures + 1 error against 257
        # passing. Until those land in their own follow-up PRs, pytest is
        # advisory.
        continue-on-error: true
        run: pytest -q --tb=line

  frontend:
    name: Frontend — tsc + vitest + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: client/yarn.lock

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: yarn audit (HIGH+CRITICAL only — blocks on hits)
        run: yarn audit --groups dependencies --level high

      - name: tsc --noEmit
        # Pre-existing TS drift catalogued in the wiring audit (NodeStatus
        # type union missing 'waiting'/'blocked', test files with stale Node
        # mocks). Advisory until the test cleanup PR lands.
        continue-on-error: true
        run: npx tsc --noEmit

      - name: vitest
        # Same pre-existing test drift — 14 failures.
        continue-on-error: true
        run: yarn vitest run --reporter=default
